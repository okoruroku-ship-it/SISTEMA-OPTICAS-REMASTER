  <text x="585" y="300" fill="#0f766e" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Docs tecnicos</text>
  <text x="585" y="346" fill="#155e75" font-family="Segoe UI, Arial, sans-serif" font-size="23">Catalogo de funciones</text>
  <text x="585" y="382" fill="#155e75" font-family="Segoe UI, Arial, sans-serif" font-size="23">Endpoints detectados</text>
  <text x="585" y="418" fill="#155e75" font-family="Segoe UI, Arial, sans-serif" font-size="23">Estudio del sistema</text>
  <text x="585" y="454" fill="#155e75" font-family="Segoe UI, Arial, sans-serif" font-size="23">Manifiesto del paquete ordenado</text>
  <rect x="1015" y="245" width="455" height="240" rx="30" fill="#eef2ff"/>
  <text x="1048" y="300" fill="#3730a3" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Refactor seguro</text>
  <text x="1048" y="345" fill="#4f46e5" font-family="Segoe UI, Arial, sans-serif" font-size="22">1. Congelar contratos</text>
  <text x="1048" y="381" fill="#4f46e5" font-family="Segoe UI, Arial, sans-serif" font-size="22">2. Separar servicios y DAO</text>
  <text x="1048" y="417" fill="#4f46e5" font-family="Segoe UI, Arial, sans-serif" font-size="22">3. Migrar una funcion a la vez</text>
  <text x="1048" y="453" fill="#4f46e5" font-family="Segoe UI, Arial, sans-serif" font-size="22">4. Validar regresion antes de relevar</text>
  <rect x="125" y="520" width="875" height="250" rx="30" fill="#ffffff"/>
  <text x="160" y="568" fill="#12314c" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Dominios funcionales</text>
  <rect x="160" y="600" width="175" height="110" rx="22" fill="#dbeafe"/>
  <text x="190" y="655" fill="#1d4ed8" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Ventas</text>
  <rect x="355" y="600" width="175" height="110" rx="22" fill="#dcfce7"/>
  <text x="378" y="655" fill="#15803d" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Inventario</text>
  <rect x="550" y="600" width="175" height="110" rx="22" fill="#fee2e2"/>
  <text x="572" y="655" fill="#dc2626" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Laboratorio</text>
