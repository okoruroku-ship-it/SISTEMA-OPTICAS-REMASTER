  <text x="1065" y="568" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Valor del showcase</text>
  <text x="1065" y="620" fill="#cfefff" font-family="Segoe UI, Arial, sans-serif" font-size="23">Legacy funcional con paquete ordenado</text>
  <text x="1065" y="658" fill="#cfefff" font-family="Segoe UI, Arial, sans-serif" font-size="23">Reduccion de ruido y dependencias no utiles</text>
  <text x="1065" y="696" fill="#cfefff" font-family="Segoe UI, Arial, sans-serif" font-size="23">Base para hardening y migracion incremental</text>
