<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Sistema Opticas Showcase</title>
  <desc id="desc">Ilustracion demostrativa de un sistema web de opticas ordenado y documentado para refactor seguro.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1335" cy="145" r="175" fill="#cffafe" opacity="0.13"/>
  <text x="110" y="120" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="700">Sistema Opticas</text>
  <text x="110" y="165" fill="#d7f6ff" font-family="Segoe UI, Arial, sans-serif" font-size="24">Version ordenada, documentada y preparada para saneamiento por fases</text>
  <rect x="95" y="210" width="1410" height="610" rx="36" fill="#f7feff" opacity="0.98"/>
  <rect x="125" y="245" width="390" height="240" rx="30" fill="#082f49"/>
  <text x="160" y="300" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Paquete ordenado</text>
  <text x="160" y="345" fill="#cfefff" font-family="Segoe UI, Arial, sans-serif" font-size="22">Fuente limpia, frontend operativo y dependencias JAR</text>
  <rect x="160" y="380" width="125" height="18" rx="9" fill="#67e8f9"/>
  <rect x="160" y="414" width="170" height="18" rx="9" fill="#67e8f9"/>
  <rect x="160" y="448" width="210" height="18" rx="9" fill="#67e8f9"/>
